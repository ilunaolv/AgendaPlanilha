<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#028DCF" />
  <title>Agenda do Prefeito</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #141b22;
      --panel-2: #1b242d;
      --card: #1f2a34;
      --accent: #028DCF;
      --accent-2: #22a7e6;
      --text: #e7eef3;
      --muted: #8aa0ad;
      --line: #243240;
      --green: #16a34a; --green-bg: #0f3d2e;
      --red: #ef4444;   --red-bg: #2a1416;
      --amber: #f59e0b; --amber-bg: #2a2110;
    }
    body.light {
      --bg: #f1f5f9; --panel: #fff; --panel-2: #e9eef3; --card: #fff;
      --accent: #028DCF; --accent-2: #028DCF; --text: #0f172a; --muted: #5b6b78;
      --line: #d4dce4;
      --green: #15803d; --green-bg: #d6f5e3;
      --red: #dc2626; --red-bg: #fde8e8;
      --amber: #d97706; --amber-bg: #fdf1e1;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background .2s, color .2s;
    }
    header {
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(180deg, #028DCF, #026ea3);
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    header h1 { font-size: 1.05rem; margin: 0; flex: 1; letter-spacing: .3px; color: #fff; }
    header .spacer { flex: 1; }
    button {
      font: inherit; border: 0; border-radius: 10px; padding: 10px 14px;
      background: rgba(255,255,255,.16); color: #fff; cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px; transition: background .15s;
    }
    button:hover { background: rgba(255,255,255,.26); }
    button.primary { background: var(--accent-2); color: #fff; font-weight: 600; }
    button.primary:hover { background: #1a96d4; }
    .container { max-width: 760px; margin: 0 auto; padding: 16px; }
    .modenav { display: flex; gap: 6px; margin-bottom: 12px; }
    .modebtn {
      flex: 1; justify-content: center; background: var(--panel-2); color: var(--muted);
      border: 1px solid var(--line); font-size: .85rem; padding: 9px 8px;
    }
    .modebtn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .daynav { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .daynav .date { flex: 1; text-align: center; }
    .daynav .date .big { font-size: 1.15rem; font-weight: 700; }
    .daynav .date .small { color: var(--muted); font-size: .82rem; }
    .daynav button { padding: 10px 14px; background: var(--panel-2); color: var(--text); }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 14px; margin-bottom: 12px; position: relative; overflow: hidden;
    }
    .card .time {
      font-weight: 700; color: var(--accent-2); font-size: 1.02rem; margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .card .event { font-size: 1rem; line-height: 1.35; }
    .card .meta { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { font-size: .78rem; padding: 4px 9px; border-radius: 999px; background: var(--panel-2); color: var(--muted); border: 1px solid var(--line); }
    .tag.note { color: var(--muted); }
    .tag.note.hi { color: #04201d; background: var(--accent-2); border-color: var(--accent-2); font-weight: 700; }
    .tag.rep { background: #14323a; color: #5eead4; border-color: #145e57; }
    body.light .tag.rep { background: #d7f5f0; color: #0d6e63; border-color: #a7e3da; }
    .tag.loc { color: var(--accent-2); border-color: var(--accent); }
    .badge { font-size: .72rem; padding: 3px 8px; border-radius: 999px; font-weight: 600; }
    .badge.sim { background: var(--green-bg); color: var(--green); }
    .badge.res { background: var(--amber-bg); color: var(--amber); }
    .badge.nao { background: var(--red-bg); color: var(--red); }
    .card .actions { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 6px; }
    .card .mini {
      background: var(--panel-2); color: var(--text); border: 1px solid var(--line);
      padding: 7px 10px; border-radius: 9px; font-size: .82rem; cursor: pointer; flex: 1; justify-content: center;
    }
    .card .mini.active-sim { background: var(--green); color: #fff; border-color: var(--green); font-weight: 700; }
    .card .mini.active-não, .card .mini.active-nao { background: var(--red); color: #fff; border-color: var(--red); font-weight: 700; }
    .card .mini.active-reservar { background: var(--amber); color: #1a1300; border-color: var(--amber); font-weight: 700; }
    .card .pickbtn, .card .locbtn {
      margin-top: 10px; width: 100%; justify-content: center;
      background: var(--accent); color: #fff; border-radius: 9px; padding: 9px;
    }
    .card .pickbtn:hover, .card .locbtn:hover { background: #1a96d4; }
    .card .locbtn { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
    .period { margin-bottom: 16px; }
    .period-head {
      display: flex; align-items: center; gap: 10px; padding: 6px 4px 10px;
      border-bottom: 1px solid var(--line); margin-bottom: 12px;
    }
    .period-head .pd { font-size: .8rem; color: var(--muted); text-transform: capitalize; }
    .period-head .pd-num { font-size: 1.2rem; font-weight: 800; color: var(--text); background: var(--panel-2); border-radius: 8px; padding: 1px 9px; }
    .period-head .pd-count { margin-left: auto; font-size: .78rem; color: var(--accent-2); }
    .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: .95rem; }
    .empty.small { padding: 8px 0; font-size: .85rem; opacity: .6; }
    .loader { text-align: center; color: var(--muted); padding: 40px; font-size: 1rem; }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--panel-2); border: 1px solid var(--line); color: var(--text);
      padding: 12px 18px; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.4);
      z-index: 50; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; max-width: 90vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .login-wrap {
      min-height: 70vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; gap: 18px; padding: 24px;
    }
    .login-wrap .logo { width: 84px; height: 84px; }
    .login-wrap p { color: var(--muted); max-width: 380px; line-height: 1.5; }
    .offline-pill { font-size: .72rem; padding: 3px 9px; border-radius: 999px; background: var(--amber-bg); color: var(--amber); margin-left: 8px; display: none; }
    .offline-pill.show { display: inline-block; }
    footer { text-align: center; color: var(--muted); font-size: .75rem; padding: 20px; }
    .sync { font-size: .75rem; color: var(--muted); margin-bottom: 12px; }

    /* Loading overlay */
    .loading-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
      display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; color: #fff;
    }
    .spinner {
      width: 42px; height: 42px; border: 4px solid rgba(255,255,255,.25);
      border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 16px;
    }
    .modal {
      background: var(--card); border: 1px solid var(--line); border-radius: 16px;
      padding: 18px; width: 100%; max-width: 420px; max-height: 80vh; overflow: auto;
    }
    .modal h3 { margin: 0 0 12px; font-size: 1.05rem; }
    .picklist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .pick { display: flex; align-items: center; gap: 10px; font-size: .95rem; padding: 6px 4px; }
    .pick input { width: 18px; height: 18px; accent-color: var(--accent); }
    .subinput {
      width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--line);
      border-radius: 9px; padding: 9px 11px; font: inherit;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .modal-actions button { flex: 1; justify-content: center; border: 1px solid var(--line); }
  </style>
</head>
<body>
  <header>
    <h1>Agenda do Prefeito<span class="offline-pill" id="offlinePill">offline</span></h1>
    <div class="spacer"></div>
    <button id="themeBtn" title="Alternar tema">🌙</button>
    <button id="refreshBtn" title="Atualizar">↻</button>
    <button id="loginBtn" class="primary">Entrar com Google</button>
    <button id="logoutBtn" style="display:none">Sair</button>
  </header>

  <main class="container" id="main">
    <div class="login-wrap" id="loginWrap" style="display:none">
      <img class="logo" src="icon.svg" alt="logo" />
      <h2>Agenda do Prefeito</h2>
      <p>Faça login com sua conta Google para visualizar a agenda sincronizada com a planilha, sempre atualizada.</p>
      <button class="primary" id="loginBtn2">Entrar com Google</button>
      <button id="debugBtn" style="background:var(--panel-2);color:var(--text);border:1px solid var(--line)">🔎 Testar conexão</button>
    </div>

    <div id="app" style="display:none">
      <div class="modenav">
        <button class="modebtn active" data-mode="dia">Dia</button>
        <button class="modebtn" data-mode="semana">Semana</button>
        <button class="modebtn" data-mode="mes">Mês</button>
      </div>
      <div class="daynav">
        <button id="prevDay">‹</button>
        <div class="date">
          <div class="big" id="dateBig">—</div>
          <div class="small" id="dateSmall"></div>
        </div>
        <button id="todayBtn">Hoje</button>
        <button id="nextDay">›</button>
      </div>
      <div class="sync" id="syncInfo"></div>
      <div id="list"></div>
    </div>

    <div class="loader" id="loader" style="display:none">Carregando agenda…</div>
  </main>

  <footer>Agenda do Prefeito · PWA</footer>
  <div class="toast" id="toast"></div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-msg">Carregando…</div>
  </div>

  <script src="config.js" defer></script>
  <script src="app.js" defer></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
